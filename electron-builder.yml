appId: com.obamafier.app
productName: Obamafier
directories:
  output: release
  buildResources: assets
files:
  - dist/**/*
  - assets/**/*
  - "!node_modules/**/*"
  - node_modules/sharp/**/*
  - node_modules/@img/**/*
mac:
  target:
    - dmg
    - pkg
  category: public.app-category.graphics-design
  icon: assets/icon.icns
win:
  target: nsis
  icon: assets/icon.icns
linux:
  target: AppImage
extraResources:
  - from: assets/
    to: assets/
    filter:
      - "**/*"
asar: true
